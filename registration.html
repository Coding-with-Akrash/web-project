<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | XAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card p-4 p-lg-5">
                    <h3 class="fw-bold text-center">Create Account</h3>
                    <p class="text-muted text-center mb-4">Join the future of radiology</p>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Register as:</label>
                            <select class="form-select"><option>Doctor</option><option>Patient</option></select>
                        </div>
                        <div class="mb-3"><label class="form-label small fw-bold">Full Name</label><input type="text" class="form-control"></div>
                        <div class="mb-3"><label class="form-label small fw-bold">Email</label><input type="email" class="form-control"></div>
                        <div class="mb-4"><label class="form-label small fw-bold">Password</label><input type="password" class="form-control"></div>
                        <button class="btn btn-primary w-100 rounded-pill py-2">Create Account</button>
                    </form>
                <div class="mt-5">
            <a href="index.html" class="text-muted"><i class="fas fa-arrow-left me-2"></i>Back to home</a>
        </div>
                </div>
            </div>
        </div>
        
    </div>
    
</body>
</html>
