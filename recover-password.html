<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset ECU Password | AutoDyno AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card auth-card bg-white border-0 shadow-sm p-4 rounded-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-unlock-alt fa-3x text-success mb-3"></i>
                        <h4 class="fw-bold">Set New ECU Password</h4>
                        <p class="text-muted small">Create a new password for your tuning account.</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-primary"></i>
                                </span>
                                <input type="password" class="form-control" placeholder="Secure password">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-primary"></i>
                                </span>
                                <input type="password" class="form-control" placeholder="Confirm password">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold">
                            <i class="fas fa-check me-2"></i>Reset Password
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="owner-login.html" class="text-muted small text-decoration-none">
                            <i class="fas fa-sign-in-alt me-2"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
