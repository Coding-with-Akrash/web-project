<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card auth-card p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold">Patient Login</h4>
                        <p class="text-muted small">Access diagnostic insights</p>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small">Patient ID</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Password</label>
                            <input type="password" class="form-control">
                        </div>
                        <div class="text-end mb-3"><a href="forgot-password.html" class="small text-decoration-none">Forgot Password?</a></div>
                       
                        <button class="btn btn-primary w-100 rounded-pill">Sign In</button>
                    </form>
                    <p class="text-center mt-3 small"><a href="registration.html" class="text-primary text-decoration-none">Don't have an account?</a></p>
                    <div class="mt-5">
            <a href="index.html" class="text-muted"><i class="fas fa-arrow-left me-2"></i>Back to home</a>
        </div>
            </div>
        </div>
    </div>
</body>
</html>
