<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tuner Login | AutoDyno AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card auth-card bg-white border-0 shadow-sm p-4 rounded-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-wrench fa-3x text-warning mb-3"></i>
                        <h3 class="fw-bold">Professional Tuner Login</h3>
                        <p class="text-muted">Access advanced dyno tuning software</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tuner Email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope text-primary"></i>
                                </span>
                                <input type="email" class="form-control" placeholder="tuner@shop.com">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-primary"></i>
                                </span>
                                <input type="password" class="form-control" placeholder="Tuner password">
                            </div>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="shop">
                            <label class="form-check-label small text-muted" for="shop">Professional Shop Account</label>
                        </div>
                        
                        <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 fw-bold mb-3 text-dark">
                            <i class="fas fa-tools me-2"></i>Open Tuning Suite
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <a href="forgot-password.html" class="text-muted small text-decoration-none">Forgot tuner credentials?</a>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <span class="text-muted small">Not a professional tuner? </span>
                        <a href="owner-login.html" class="text-warning text-decoration-none">Switch to Owner Access</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="login-choice.html" class="text-muted text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i>Back to Login Options
            </a>
        </div>
    </div>
</body>
</html>
