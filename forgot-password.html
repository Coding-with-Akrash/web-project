<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card auth-card p-4">
                    <div class="recovery-icon"><i class="fas fa-lock-open"></i></div>
                    <h4 class="fw-bold">Forgot Password</h4>
                    <p class="text-muted small mb-4">Enter your email to receive a reset link.</p>
                    <form action="recover-password.html">
                        <input type="email" class="form-control mb-3" placeholder="Email Address" required>
                        <button class="btn btn-primary w-100 rounded-pill py-2">Send Link</button>
                    </form>
                    <a href="index.html" class="d-block mt-3 small text-muted text-decoration-none">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
